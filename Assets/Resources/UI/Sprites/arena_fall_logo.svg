<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D4FF"/>
      <stop offset="50%" style="stop-color:#FF6B35"/>
      <stop offset="100%" style="stop-color:#00D4FF"/>
    </linearGradient>
    <linearGradient id="subGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8899AA"/>
      <stop offset="100%" style="stop-color:#B0B8C4"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="400" fill="#0A1628" rx="10"/>
  
  <!-- Grid lines -->
  <g opacity="0.1" stroke="#00D4FF" stroke-width="0.5">
    <line x1="0" y1="50" x2="800" y2="50"/>
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="250" x2="800" y2="250"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="350" x2="800" y2="350"/>
    <line x1="100" y1="0" x2="100" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="500" y1="0" x2="500" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="700" y1="0" x2="700" y2="400"/>
  </g>
  
  <!-- Chevron symbol -->
  <g transform="translate(400, 60)">
    <polygon points="-40,0 0,30 40,0 35,0 0,25 -35,0" fill="url(#logoGrad)" opacity="0.8"/>
  </g>
  
  <!-- ARENA text -->
  <text x="400" y="180" font-family="'Orbitron', 'Arial Black', sans-serif" font-size="96" 
        font-weight="bold" fill="url(#logoGrad)" text-anchor="middle" letter-spacing="15">
    ARENA
  </text>
  
  <!-- FALL text -->
  <text x="400" y="270" font-family="'Orbitron', 'Arial Black', sans-serif" font-size="80" 
        font-weight="bold" fill="#FFFFFF" text-anchor="middle" letter-spacing="12">
    FALL
  </text>
  
  <!-- Subtitle -->
  <text x="400" y="320" font-family="'Inter', 'Arial', sans-serif" font-size="18" 
        fill="url(#subGrad)" text-anchor="middle" letter-spacing="8">
    SURVIVE THE FALL
  </text>
  
  <!-- Decorative lines -->
  <line x1="250" y1="290" x2="350" y2="290" stroke="#FF6B35" stroke-width="1" opacity="0.5"/>
  <line x1="450" y1="290" x2="550" y2="290" stroke="#FF6B35" stroke-width="1" opacity="0.5"/>
</svg>
