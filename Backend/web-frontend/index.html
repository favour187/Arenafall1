<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arena Fall — Official Glassmorphic Esports Portal</title>
<style>
  :root {
    --navy: #0A1628; --steel: #1E3A5F; --dark-navy: #050B14;
    --primary: #FF6B35; --cyan: #00D4FF; --amber: #FFB800; --green: #44FF55;
    --text: #FFFFFF; --text2: #B0B8C4; --text3: #607080;
    --radius: 8px; --shadow: 0 8px 32px rgba(0, 212, 255, 0.15);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { 
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
    background: var(--navy); 
    background-image: radial-gradient(circle at 50% 0%, rgba(0, 212, 255, 0.12) 0%, rgba(5, 11, 20, 0.98) 85%);
    color: var(--text); 
    min-height: 100vh; 
  }
  
  .header { 
    background: rgba(30, 58, 95, 0.92); 
    backdrop-filter: blur(16px); 
    padding: 18px 40px; 
    display: flex; 
    justify-content: space-between; 
    align-items: center; 
    box-shadow: var(--shadow); 
    position: sticky; 
    top: 0; 
    z-index: 100; 
    border-bottom: 2px solid var(--cyan); 
  }
  .header .logo { font-size: 24px; font-weight: 900; color: var(--primary); letter-spacing: 1.5px; display: flex; align-items: center; gap: 10px; text-transform: uppercase; }
  .header .nav a { color: var(--text2); text-decoration: none; margin-left: 28px; font-size: 13px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; transition: color 0.2s; }
  .header .nav a:hover { color: var(--cyan); }

  .container { max-width: 1280px; margin: 0 auto; padding: 32px; }
  .hero { 
    text-align: center; 
    padding: 64px 24px; 
    background: linear-gradient(180deg, rgba(30, 58, 95, 0.4) 0%, rgba(10, 22, 40, 0.95) 100%); 
    border-radius: 12px; 
    border: 1px solid rgba(0, 212, 255, 0.3); 
    margin-bottom: 32px; 
    box-shadow: inset 0 0 40px rgba(0,0,0,0.8);
  }
  .hero h1 { font-size: 56px; font-weight: 900; color: var(--text); margin-bottom: 16px; letter-spacing: 1.5px; text-transform: uppercase; }
  .hero h1 span { color: var(--primary); }
  .hero p { font-size: 18px; color: var(--text2); max-width: 680px; margin: 0 auto 32px; line-height: 1.6; }

  .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin: 32px 0; }
  .stat-card { 
    background: var(--steel); 
    padding: 28px; 
    border-radius: var(--radius); 
    box-shadow: var(--shadow); 
    text-align: center; 
    border: 1px solid rgba(0, 212, 255, 0.25); 
    border-bottom: 4px solid var(--cyan); 
    transition: transform 0.2s, border-color 0.2s; 
  }
  .stat-card:hover { transform: translateY(-3px); border-color: var(--primary); }
  .stat-card .value { font-size: 40px; font-weight: 900; margin: 8px 0; color: var(--cyan); letter-spacing: 0.5px; }
  .stat-card .label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 2px; font-weight: 800; }

  .card { 
    background: var(--steel); 
    border-radius: var(--radius); 
    padding: 28px; 
    margin: 20px 0; 
    box-shadow: var(--shadow); 
    border: 1px solid rgba(0, 212, 255, 0.25); 
  }
  .card h2 { font-size: 20px; font-weight: 900; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; color: var(--cyan); text-transform: uppercase; letter-spacing: 1px; }

  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th { text-align: left; padding: 14px; color: var(--text2); font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; border-bottom: 2px solid var(--navy); font-weight: 800; }
  td { padding: 14px; border-bottom: 1px solid rgba(255,255,255,0.06); }
  tr:hover td { background: rgba(0,212,255,0.06); }

  .search-box { display: flex; gap: 10px; max-width: 540px; margin: 24px auto; }
  .search-box input { 
    flex: 1; 
    background: var(--navy); 
    border: 1px solid var(--cyan); 
    color: var(--text); 
    padding: 14px 18px; 
    border-radius: var(--radius); 
    font-size: 15px; 
    font-weight: 600;
  }
  .search-box input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 12px rgba(255, 107, 53, 0.4); }
  .search-box button { 
    background: var(--primary); 
    color: white; 
    border: none; 
    padding: 14px 28px; 
    border-radius: var(--radius); 
    cursor: pointer; 
    font-size: 15px; 
    font-weight: 900; 
    text-transform: uppercase; 
    letter-spacing: 1px; 
  }
  .search-box button:hover { background: #FF8555; }

  .badge { display: inline-block; padding: 4px 10px; border-radius: 4px; font-size: 11px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.5px; }
  .badge.orange { background: rgba(255,107,53,0.22); color: var(--primary); border: 1px solid var(--primary); }
  .badge.cyan { background: rgba(0,212,255,0.22); color: var(--cyan); border: 1px solid var(--cyan); }
  .badge.green { background: rgba(68,255,85,0.22); color: var(--green); border: 1px solid var(--green); }

  footer { text-align: center; padding: 28px; color: var(--text3); font-size: 13px; border-top: 1px solid var(--steel); margin-top: 56px; text-transform: uppercase; letter-spacing: 0.5px; }
</style>
</head>
<body>
<header class="header">
  <div class="logo">🎮 ARENA FALL — ESPORTS PORTAL</div>
  <nav class="nav">
    <a href="#" onclick="showPage('home')">Home</a>
    <a href="#" onclick="showPage('leaderboard')">Leaderboard</a>
    <a href="#" onclick="showPage('tournaments')">Tournaments</a>
    <a href="#" onclick="showPage('seasons')">Seasons</a>
    <a href="#" onclick="showPage('replays')">Replays</a>
  </nav>
</header>

<div class="container">
  <div id="page-content"></div>
</div>

<footer>© 2026 Arena Fall Games. All rights reserved. • <a href="#" style="color:var(--cyan);text-decoration:none;" onclick="alert('Privacy Policy Enabled')">Privacy Policy</a> • <a href="#" style="color:var(--cyan);text-decoration:none;" onclick="alert('Terms of Service Enabled')">Terms of Service</a></footer>

<script>
const API = (window.location.hostname === 'localhost' && window.location.port === '3000') ? 'http://localhost:3000/api/v1' : 'https://arenafall-api.onrender.com/api/v1';

async function api(path) {
  try {
    const res = await fetch(`${API}${path}`);
    return await res.json();
  } catch { return null; }
}

function showPage(page) {
  const el = document.getElementById('page-content');
  if (!el) return;
  if (page === 'home') renderHome(el);
  else if (page === 'leaderboard') renderLeaderboard(el);
  else if (page === 'tournaments') renderTournaments(el);
  else if (page === 'seasons') renderSeasons(el);
  else if (page === 'replays') renderReplays(el);
}

async function renderHome(el) {
  el.innerHTML = `
    <div class="hero">
      <h1>🏆 ARENA FALL BATTLE ROYALE</h1>
      <p>Clean Sci-Fi Glassmorphic Battle Royale engine featuring holographic cyan HUD elements, orbital jump pads, bipedal combat walkers, and 60-player authoritative server supervision.</p>
      <div class="search-box">
        <input id="search-input" placeholder="Search Operative Career Stats..." onkeyup="if(event.key==='Enter')searchPlayer()">
        <button onclick="searchPlayer()">LOOK UP STATS</button>
      </div>
      <div id="search-result"></div>
    </div>
    <div class="stat-grid">
      <div class="stat-card"><div class="value" id="val-players">--</div><div class="label">Registered Operatives</div></div>
      <div class="stat-card"><div class="value" id="val-matches">--</div><div class="label">Live Authoritative Lobbies</div></div>
      <div class="stat-card"><div class="value" id="val-tournaments">--</div><div class="label">Active Competitive Cups</div></div>
      <div class="stat-card"><div class="value" id="val-season">--</div><div class="label">Current Battle Pass</div></div>
    </div>
  `;

  const lbData = await api('/leaderboard?category=wins&limit=100');
  document.getElementById('val-players').textContent = lbData?.total !== undefined ? lbData.total.toLocaleString() : '0';

  const matchData = await api('/matches/recent/1');
  document.getElementById('val-matches').textContent = matchData?.matches?.length !== undefined ? matchData.matches.length.toString() : '0';

  const tData = await api('/tournaments');
  document.getElementById('val-tournaments').textContent = tData?.active?.length !== undefined ? tData.active.length.toString() : '0';

  const sData = await api('/seasons');
  const activeSeason = sData?.seasons?.find(s => s.isCurrent);
  document.getElementById('val-season').textContent = activeSeason ? activeSeason.name : 'Off-Season';

  window.searchPlayer = async () => {
    const q = document.getElementById('search-input').value.trim();
    if (!q) return;
    const results = await api(`/players/search?q=${encodeURIComponent(q)}`);
    const resEl = document.getElementById('search-result');
    if (!results?.results?.length) {
      resEl.innerHTML = `<p style="color:var(--primary);padding:14px;font-weight:bold;">No operatives found matching "${q}"</p>`;
    } else {
      resEl.innerHTML = results.results.map(p => `
        <div style="background:var(--steel);padding:14px 18px;border-radius:6px;margin:10px 0;display:flex;justify-content:space-between;align-items:center;border:1px solid var(--cyan);">
          <div><strong>${p.displayName || p.username}</strong> <span class="badge cyan">⚡ LVL ${p.level}</span></div>
          <span class="badge orange">🏆 ${p.level >= 30 ? 'GRANDMASTER' : 'HEROIC'} TIER</span>
        </div>
      `).join('');
    }
  };
}

async function renderLeaderboard(el) {
  el.innerHTML = `
    <h1 style="margin:24px 0;color:var(--cyan);">📊 Global Operative Rankings</h1>
    <div style="display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;">
      <button class="badge cyan" style="padding:10px 18px;cursor:pointer;border:none;font-size:12px;" onclick="loadLB('wins',this)">🏆 Wins</button>
      <button class="badge orange" style="padding:10px 18px;cursor:pointer;border:none;font-size:12px;" onclick="loadLB('kills',this)">💀 Kills</button>
      <button class="badge cyan" style="padding:10px 18px;cursor:pointer;border:none;font-size:12px;" onclick="loadLB('damage',this)">💥 Damage</button>
    </div>
    <div class="card" id="lb-card">
      <div id="lb-content">Loading live server rankings...</div>
    </div>
  `;

  window.loadLB = async (cat, btn) => {
    document.querySelectorAll('[onclick^="loadLB"]').forEach(b => b.className = 'badge cyan');
    btn.className = 'badge orange';
    const lb = await api(`/leaderboard?category=${cat}&limit=25`);
    const container = document.getElementById('lb-content');
    if (!lb?.results || lb.results.length === 0) {
      container.innerHTML = `<p style="color:var(--text3);padding:20px;">No ranked telemetry recorded yet for this category.</p>`;
      return;
    }

    container.innerHTML = `
      <table>
        <tr><th>Rank</th><th>Operative</th><th>Value</th><th>Stats</th></tr>
        ${lb.results.map((p, i) => `
          <tr>
            <td style="font-weight:900;font-size:16px;">#${p.rank || i + 1}</td>
            <td><strong>${p.displayName || p.username}</strong> <span class="badge cyan">LVL ${p.level || 1}</span></td>
            <td style="font-size:18px;font-weight:900;color:var(--cyan);">${(p.value || 0).toLocaleString()}</td>
            <td style="color:var(--text2);font-size:12px;">${p.matchesPlayed || 0} matches</td>
          </tr>
        `).join('')}
      </table>
    `;
  };

  loadLB('wins', document.querySelector('[onclick^="loadLB"]'));
}

async function renderTournaments(el) {
  el.innerHTML = `<h1 style="margin:24px 0;color:var(--cyan);">🏆 Competitive Tournaments</h1><div id="t-content">Loading tournament brackets...</div>`;
  const t = await api('/tournaments');
  const container = document.getElementById('t-content');
  
  if (!t || (!t.active?.length && !t.upcoming?.length && !t.completed?.length)) {
    container.innerHTML = `<div class="card"><p style="color:var(--text3);">No active tournament seasons registered in backend.</p></div>`;
    return;
  }

  const renderSection = (title, list) => list?.length ? `
    <div class="card">
      <h2>${title}</h2>
      ${list.map(tn => `
        <div style="display:flex;justify-content:space-between;align-items:center;padding:14px;background:var(--navy);border-radius:4px;margin:8px 0;">
          <div><strong>${tn.name}</strong> <span class="badge cyan">${tn.mode}</span></div>
          <div style="color:var(--text2);font-size:13px;">${tn.players || tn.registered?.length || 0}/${tn.maxPlayers} registered</div>
          <span class="badge ${tn.status === 'live' ? 'green' : 'orange'}">${tn.status}</span>
        </div>
      `).join('')}
    </div>
  ` : '';

  container.innerHTML = 
    renderSection('🔴 Live Cups', t.active) +
    renderSection('📅 Upcoming Cups', t.upcoming) +
    renderSection('✅ Completed Cups', t.completed);
}

async function renderSeasons(el) {
  el.innerHTML = `<h1 style="margin:24px 0;color:var(--cyan);">📅 Seasonal Battle Pass</h1><div id="s-content">Loading active season info...</div>`;
  const seasons = await api('/seasons');
  const container = document.getElementById('s-content');
  if (!seasons?.seasons || seasons.seasons.length === 0) {
    container.innerHTML = `<div class="card"><p style="color:var(--text3);">No active season pass deployed.</p></div>`;
    return;
  }

  container.innerHTML = seasons.seasons.map(s => `
    <div class="card" style="${s.isCurrent ? 'border-left:4px solid var(--primary);' : ''}">
      <h2>${s.name} <span class="badge ${s.isCurrent ? 'green' : 'orange'}">${s.isCurrent ? 'ACTIVE' : 'ENDED'}</span></h2>
      <p style="color:var(--text2);margin:10px 0;">Theme: ${s.theme} | ${s.battlePassTiers} Progression Tiers | ${s.premiumCost} Premium Diamonds</p>
      <p style="color:var(--text3);font-size:12px;">Duration: ${new Date(s.startDate).toLocaleDateString()} to ${new Date(s.endDate).toLocaleDateString()}</p>
    </div>
  `).join('');
}

async function renderReplays(el) {
  el.innerHTML = `<h1 style="margin:24px 0;color:var(--cyan);">🎥 Telemetry Replay Archives</h1><div id="r-content">Loading replay archives...</div>`;
  const replays = await api('/replays');
  const container = document.getElementById('r-content');
  if (!replays?.replays || replays.replays.length === 0) {
    container.innerHTML = `<div class="card"><p style="color:var(--text3);">No telemetry matches recorded in server logs yet.</p></div>`;
    return;
  }

  container.innerHTML = `<div class="card">
    <table>
      <tr><th>Match Ticket</th><th>Mode</th><th>Action Logs</th><th>Recorded Date</th></tr>
      ${replays.replays.slice(0, 15).map(r => `
        <tr>
          <td><code>${(r.matchId || '').slice(0, 24)}...</code></td>
          <td><span class="badge cyan">${r.metadata?.mode || 'Solo'}</span></td>
          <td>${(r.actionCount || 0).toLocaleString()} actions</td>
          <td>${r.recordedAt ? new Date(r.recordedAt).toLocaleDateString() : 'Recent'}</td>
        </tr>
      `).join('')}
    </table>
  </div>`;
}

showPage('home');
</script>
</body>
</html>
