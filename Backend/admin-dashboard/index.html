<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arena Fall — Admin Dashboard</title>
<style>
  :root {
    --bg: #0A1628; --bg2: #1E3A5F; --bg3: #2A4A7F;
    --primary: #FF6B35; --cyan: #00D4FF; --green: #44FF55; --red: #FF2244;
    --text: #FFFFFF; --text2: #B0B8C4; --text3: #607080;
    --radius: 8px; --shadow: 0 4px 20px rgba(0,0,0,0.3);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--bg2); border-radius: 3px; }

  /* Layout */
  .app { display: flex; min-height: 100vh; }
  .sidebar { width: 250px; background: var(--bg2); padding: 24px 20px; position: fixed; height: 100vh; overflow-y: auto; z-index: 100; border-right: 1px solid rgba(255,255,255,0.06); display: flex; flex-direction: column; justify-content: space-between; }
  .main { margin-left: 250px; flex: 1; padding: 32px 36px; max-width: 1500px; }

  .logo { font-size: 20px; font-weight: 800; color: var(--primary); margin-bottom: 28px; display: flex; align-items: center; gap: 10px; letter-spacing: 0.5px; }
  .logo small { font-size: 11px; color: var(--cyan); font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }

  .nav-item { padding: 12px 16px; margin: 4px 0; border-radius: var(--radius); cursor: pointer; color: var(--text2); display: flex; align-items: center; gap: 12px; font-size: 14px; font-weight: 500; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); border-left: 3px solid transparent; }
  .nav-item:hover { background: rgba(255,255,255,0.05); color: var(--text); transform: translateX(3px); }
  .nav-item.active { background: rgba(255,107,53,0.15); color: var(--primary); border-left-color: var(--primary); font-weight: 700; }

  .sidebar-footer { padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.06); font-size: 12px; color: var(--text3); line-height: 1.6; }
  .sidebar-footer .pulse { display: inline-block; width: 8px; height: 8px; background: var(--green); border-radius: 50%; margin-right: 6px; box-shadow: 0 0 8px var(--green); }

  /* Cards */
  .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-bottom: 28px; }
  .stat-card { background: var(--bg2); padding: 22px; border-radius: var(--radius); box-shadow: var(--shadow); border: 1px solid rgba(255,255,255,0.06); border-left: 4px solid var(--cyan); transition: transform 0.2s, box-shadow 0.2s; }
  .stat-card:hover { transform: translateY(-3px); box-shadow: 0 8px 30px rgba(0,0,0,0.5); }
  .stat-card .label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 1.5px; font-weight: 700; }
  .stat-card .value { font-size: 32px; font-weight: 800; margin: 10px 0 4px; letter-spacing: -0.5px; }
  .stat-card .change { font-size: 13px; color: var(--green); font-weight: 600; }
  .stat-card.alert { border-left-color: var(--red); }
  .stat-card.alert .value { color: var(--red); }

  .card { background: var(--bg2); border-radius: var(--radius); padding: 24px; margin-bottom: 20px; box-shadow: var(--shadow); border: 1px solid rgba(255,255,255,0.06); }
  .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; padding-bottom: 14px; border-bottom: 1px solid rgba(255,255,255,0.06); }
  .card-header h2 { font-size: 17px; font-weight: 700; letter-spacing: 0.3px; display: flex; align-items: center; gap: 8px; }

  /* Tables */
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 12px 14px; color: var(--text3); font-size: 11px; text-transform: uppercase; letter-spacing: 1.2px; border-bottom: 1px solid var(--bg3); font-weight: 700; }
  td { padding: 14px; border-bottom: 1px solid rgba(255,255,255,0.04); vertical-align: middle; }
  tr:hover td { background: rgba(255,255,255,0.03); }

  /* Badges */
  .badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; letter-spacing: 0.3px; }
  .badge.green { background: rgba(68,255,85,0.15); color: var(--green); border: 1px solid rgba(68,255,85,0.3); }
  .badge.red { background: rgba(255,34,68,0.15); color: var(--red); border: 1px solid rgba(255,34,68,0.3); }
  .badge.orange { background: rgba(255,107,53,0.15); color: var(--primary); border: 1px solid rgba(255,107,53,0.3); }
  .badge.cyan { background: rgba(0,212,255,0.15); color: var(--cyan); border: 1px solid rgba(0,212,255,0.3); }
  .badge.gray { background: rgba(96,112,128,0.2); color: var(--text2); border: 1px solid rgba(96,112,128,0.3); }

  /* Buttons */
  .btn { padding: 9px 18px; border: none; border-radius: var(--radius); cursor: pointer; font-size: 13px; font-weight: 700; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); display: inline-flex; align-items: center; gap: 6px; letter-spacing: 0.3px; }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: var(--primary); color: white; box-shadow: 0 4px 12px rgba(255,107,53,0.3); }
  .btn-primary:hover { background: #FF8555; box-shadow: 0 6px 16px rgba(255,107,53,0.4); }
  .btn-danger { background: var(--red); color: white; box-shadow: 0 4px 12px rgba(255,34,68,0.3); }
  .btn-danger:hover { background: #FF4466; box-shadow: 0 6px 16px rgba(255,34,68,0.4); }
  .btn-cyan { background: var(--cyan); color: var(--bg); font-weight: 800; box-shadow: 0 4px 12px rgba(0,212,255,0.3); }
  .btn-cyan:hover { opacity: 0.9; box-shadow: 0 6px 16px rgba(0,212,255,0.4); }
  .btn-sm { padding: 4px 10px; font-size: 12px; }

  /* Forms */
  input, select, textarea { background: var(--bg); border: 1px solid var(--bg3); color: var(--text); padding: 8px 12px; border-radius: var(--radius); font-size: 13px; width: 100%; }
  input:focus, select:focus { outline: none; border-color: var(--cyan); }
  .form-group { margin-bottom: 12px; }
  .form-group label { display: block; font-size: 12px; color: var(--text3); margin-bottom: 4px; }

  /* Toast */
  .toast { position: fixed; top: 20px; right: 20px; padding: 12px 20px; border-radius: var(--radius); background: var(--bg2); box-shadow: var(--shadow); z-index: 9999; transform: translateX(120%); transition: transform 0.3s; border-left: 3px solid var(--cyan); }
  .toast.show { transform: translateX(0); }
  .toast.error { border-left-color: var(--red); }
  .toast.success { border-left-color: var(--green); }

  /* Modal */
  .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 1000; }
  .modal { background: var(--bg2); border-radius: var(--radius); padding: 24px; width: 90%; max-width: 500px; max-height: 80vh; overflow-y: auto; box-shadow: var(--shadow); }

  .tabs { display: flex; gap: 4px; margin-bottom: 16px; }
  .tab { padding: 8px 16px; cursor: pointer; border-radius: var(--radius); font-size: 13px; color: var(--text2); background: transparent; border: none; }
  .tab:hover { background: var(--bg3); }
  .tab.active { background: var(--primary); color: white; }

  @media (max-width: 768px) {
    .app { flex-direction: column; }
    .sidebar { position: relative; width: 100%; height: auto; padding: 16px; flex-direction: row; flex-wrap: wrap; border-right: none; border-bottom: 1px solid rgba(255,255,255,0.08); }
    .sidebar .nav-text, .sidebar .logo-text { display: inline; }
    .sidebar .nav-item { flex: 1 1 auto; justify-content: center; padding: 8px 12px; font-size: 13px; }
    .sidebar-footer { width: 100%; text-align: center; margin-top: 12px; padding-top: 12px; }
    .main { margin-left: 0; padding: 16px; width: 100%; max-width: 100%; }
    .stat-grid { grid-template-columns: 1fr; gap: 12px; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script>
// ════════════════════════════════════════════════════════════════
//  ARENA FALL — ADMIN DASHBOARD (React-less, single HTML)
// ════════════════════════════════════════════════════════════════

const API_URL = (window.location.hostname === 'localhost' && window.location.port === '3000') ? 'http://localhost:3000/api/v1' : 'https://arenafall-api.onrender.com/api/v1';
let state = { page: 'overview', data: {}, token: localStorage.getItem('af_token') || '' };

// ─── Router ─────────────────────────────────────────────────────
function navigate(page) { state.page = page; render(); }
function getPage() { return state.page; }

// ─── API Calls ──────────────────────────────────────────────────
async function apiGet(endpoint) {
  try {
    let res = await fetch(`${API_URL}${endpoint}`, {
      headers: state.token ? { Authorization: `Bearer ${state.token}` } : {}
    });
    if (!res.ok && endpoint === '/health' && window.location.origin && window.location.origin.startsWith('http')) {
      res = await fetch(`${window.location.origin}/health`);
    }
    if (!res.ok) return { error: `HTTP ${res.status}` };
    return await res.json();
  } catch (err) {
    if (endpoint === '/health' && window.location.origin && window.location.origin.startsWith('http')) {
      try {
        const res2 = await fetch(`${window.location.origin}/health`);
        return await res2.json();
      } catch (e2) {}
    }
    return { error: err.message };
  }
}

async function apiPost(endpoint, body) {
  try {
    const res = await fetch(`${API_URL}${endpoint}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', ...(state.token ? { Authorization: `Bearer ${state.token}` } : {}) },
      body: JSON.stringify(body)
    });
    return await res.json();
  } catch (err) { return { error: err.message }; }
}

// ─── Toast ──────────────────────────────────────────────────────
function showToast(msg, type = 'success') {
  let t = document.getElementById('toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'toast'; t.className = 'toast';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.className = 'toast ' + type;
  setTimeout(() => t.classList.add('show'), 10);
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ─── Terms & Privacy Modals ─────────────────────────────────────
window.showTermsModal = () => {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal">
      <h2 style="margin-bottom:16px;color:var(--primary);">📜 Arena Fall Terms of Service</h2>
      <div style="font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:20px;">
        <p style="margin-bottom:10px;"><strong>1. Authoritative Core:</strong> By accessing the Admin Dashboard, you agree to strictly follow Arena Fall community management guidelines and anti-cheat protocol standards.</p>
        <p style="margin-bottom:10px;"><strong>2. Sanction Policy:</strong> Automated 24-hour shadow bans (<strong>status: 'banned'</strong>) and permanent sanctions must be issued strictly based on verified 30Hz movement/combat telemetry anomalies or proven terms violations.</p>
        <p><strong>3. Confidentiality:</strong> Player IP addresses (<strong>lastIp</strong>) and account identifiers must remain strictly confidential.</p>
      </div>
      <button class="btn btn-primary" style="width:100%;justify-content:center;" onclick="this.closest('.modal-overlay').remove()">I Understand & Agree</button>
    </div>
  `;
  document.body.appendChild(overlay);
  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
};

window.showPrivacyModal = () => {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal">
      <h2 style="margin-bottom:16px;color:var(--cyan);">🔒 Arena Fall Privacy & Security Policy</h2>
      <div style="font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:20px;">
        <p style="margin-bottom:10px;"><strong>1. Telemetry Processing:</strong> The admin dashboard processes real-time server tickrate (<strong>30.0 Hz</strong>), memory consumption (<strong>memoryMB</strong>), and spatial grid matchmaking metrics to supervise server stability.</p>
        <p><strong>2. Data Core Protection:</strong> All admin actions (<strong>clear_zombies</strong>, <strong>reset_metrics</strong>, <strong>unban_player</strong>) are authenticated via secure JWT tokens (<strong>authenticate / adminOnly</strong>).</p>
      </div>
      <button class="btn btn-cyan" style="width:100%;justify-content:center;" onclick="this.closest('.modal-overlay').remove()">Close Policy</button>
    </div>
  `;
  document.body.appendChild(overlay);
  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
};

// ════════════════════════════════════════════════════════════════
//  RENDER ENGINE
// ════════════════════════════════════════════════════════════════

function render() {
  const root = document.getElementById('root');
  root.innerHTML = `
    <div class="app">
      <nav class="sidebar">
        <div>
          <div class="logo">🎮 <span class="logo-text">Arena Fall <small>PRO ADMIN</small></span></div>
          ${renderNav()}
        </div>
        <div class="sidebar-footer">
          <div><span class="pulse"></span><strong>Authoritative Core</strong></div>
          <div style="margin-top:4px;">Tickrate: <span style="color:var(--cyan)">30.0 Hz</span></div>
          <div>Memory: <span style="color:var(--text2)">In-Memory Active</span></div>
        </div>
      </nav>
      <main class="main">
        <div id="page-content"></div>
        <footer style="margin-top:40px;padding-top:20px;border-top:1px solid rgba(255,255,255,0.06);text-align:center;font-size:12px;color:var(--text3);">
          © 2026 Arena Fall Pro Admin Core • <a href="#" style="color:var(--cyan);text-decoration:none;" onclick="showPrivacyModal()">Privacy Policy</a> • <a href="#" style="color:var(--cyan);text-decoration:none;" onclick="showTermsModal()">Terms of Service</a>
        </footer>
      </main>
    </div>
  `;
  renderPage();
}

function renderNav() {
  const pages = [
    { id: 'overview', icon: '📊', label: 'Overview' },
    { id: 'supervision', icon: '📡', label: 'Supervision' },
    { id: 'players', icon: '👥', label: 'Players' },
    { id: 'matches', icon: '🎮', label: 'Matches' },
    { id: 'tournaments', icon: '🏆', label: 'Tournaments' },
    { id: 'seasons', icon: '📅', label: 'Seasons' },
    { id: 'replays', icon: '🎥', label: 'Replays' },
    { id: 'shop', icon: '🛒', label: 'Shop' },
    { id: 'reports', icon: '🚨', label: 'Reports' },
    { id: 'settings', icon: '⚙️', label: 'Settings' },
  ];
  return pages.map(p => `
    <div class="nav-item ${state.page === p.id ? 'active' : ''}"
         onclick="navigate('${p.id}')">
      <span>${p.icon}</span>
      <span class="nav-text">${p.label}</span>
    </div>
  `).join('');
}

function renderPage() {
  const content = document.getElementById('page-content');
  if (!content) return;

  switch (state.page) {
    case 'overview': renderOverview(content); break;
    case 'supervision': renderSupervision(content); break;
    case 'players': renderPlayers(content); break;
    case 'matches': renderMatches(content); break;
    case 'tournaments': renderTournaments(content); break;
    case 'seasons': renderSeasons(content); break;
    case 'replays': renderReplays(content); break;
    case 'shop': renderShop(content); break;
    case 'reports': renderReports(content); break;
    case 'settings': renderSettings(content); break;
  }
}

// ════════════════════════════════════════════════════════════════
//  PAGES
// ════════════════════════════════════════════════════════════════

// ─── OVERVIEW ───────────────────────────────────────────────────
async function renderOverview(el) {
  el.innerHTML = `
    <h1 style="margin-bottom:24px;">📊 Dashboard Overview</h1>
    <div class="stat-grid" id="stats-grid">
      <div class="stat-card"><div class="label">Total Players</div><div class="value" id="stat-players">—</div></div>
      <div class="stat-card"><div class="label">Matches Today</div><div class="value" id="stat-matches">—</div></div>
      <div class="stat-card"><div class="label">Active Tournaments</div><div class="value" id="stat-tournaments">—</div></div>
      <div class="stat-card alert"><div class="label">Reports Pending</div><div class="value" id="stat-reports">—</div></div>
    </div>
    <div class="card">
      <div class="card-header"><h2>🖥️ Server Status</h2></div>
      <div id="server-status">Checking...</div>
    </div>
    <div class="card">
      <div class="card-header"><h2>📋 Recent Activity</h2></div>
      <div id="recent-activity">Loading...</div>
    </div>
  `;

  // Fetch data
  const health = await apiGet('/health');
  const leaderboard = await apiGet('/leaderboard?category=wins&limit=10');
  const tournaments = await apiGet('/tournaments');
  const supervision = await apiGet('/supervision/status');

  document.getElementById('stat-players').textContent = leaderboard?.total?.toLocaleString() || '0';
  const allTourneys = (tournaments && !tournaments.error) ? [...(tournaments.active||[]), ...(tournaments.upcoming||[])] : [];
  document.getElementById('stat-tournaments').textContent = allTourneys.filter(x => x.status === 'live').length;
  document.getElementById('stat-reports').textContent = (supervision && supervision.data && supervision.data.activeInfractions) ? supervision.data.activeInfractions.length : '0';

  const statusEl = document.getElementById('server-status');
  if (health?.status === 'online' || health?.game || (health && !health.error)) {
    statusEl.innerHTML = `
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-top:12px;">
        <div><span class="badge green">● ONLINE</span> API Server (${health?.version || 'v1'})</div>
        <div><span class="badge ${health?.services?.database === 'connected' ? 'green' : 'orange'}">● ${health?.services?.database || 'in-memory'}</span> Data Core</div>
        <div><span class="badge ${health?.services?.redis === 'connected' ? 'green' : 'gray'}">● ${health?.services?.redis || 'memory sync'}</span> Redis</div>
        <div>⏱️ Uptime: ${Math.floor((health?.uptime || process.uptime()) / 3600)}h ${Math.floor(((health?.uptime || process.uptime()) % 3600) / 60)}m</div>
        <div>📅 ${new Date(health?.timestamp || Date.now()).toLocaleString()}</div>
      </div>
      ${health?.services?.database === 'disconnected' ? `<div style="margin-top:12px;padding:10px;background:rgba(255,107,53,0.1);border:1px solid rgba(255,107,53,0.3);border-radius:6px;font-size:12px;color:var(--text2);">⚠️ <strong>MongoDB Disconnected Diagnosis:</strong> ${health?.services?.mongoError || 'Check that your Render environment variable is named MONGODB_URI (or MONGO_URI) and that MongoDB Atlas Network Access is whitelisted to 0.0.0.0/0 (Allow Access From Anywhere). Server currently running authoritatively in memory with zero downtime!'}</div>` : ''}
    `;
  } else {
    statusEl.innerHTML = `<span class="badge red">● OFFLINE</span> Server unreachable`;
  }

  // Recent matches
  const recent = await apiGet('/matches/recent/5');
  document.getElementById('recent-activity').innerHTML = recent?.matches?.length
    ? `<table>
        <tr><th>Match ID</th><th>Mode</th><th>Map</th><th>Players</th><th>Ended</th></tr>
        ${recent.matches.map(m => `<tr>
          <td><code>${(m.matchId || '').slice(0, 20)}...</code></td>
          <td><span class="badge cyan">${m.mode || 'solo'}</span></td>
          <td>${m.map || 'Arena-7'}</td>
          <td>${m.playerCount || '?'}</td>
          <td>${m.endedAt ? new Date(m.endedAt).toLocaleString() : ''}</td>
        </tr>`).join('')}
      </table>`
    : 'No matches yet';
}

// ─── PLAYERS ────────────────────────────────────────────────────
async function renderPlayers(el) {
  el.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <h1>👥 Players</h1>
      <div style="display:flex;gap:8px;">
        <input id="search-input" placeholder="Search player..." style="width:250px;" onkeyup="if(event.key==='Enter')searchPlayer()">
        <button class="btn btn-cyan" onclick="searchPlayer()">Search</button>
      </div>
    </div>
    <div class="card">
      <div class="tabs">
        <button class="tab active" onclick="switchPlayerTab('all',this)">All Players</button>
        <button class="tab" onclick="switchPlayerTab('online',this)">Online</button>
        <button class="tab" onclick="switchPlayerTab('banned',this)">Banned</button>
      </div>
      <div id="player-table">
        <table><tr><th>Username</th><th>Level</th><th>Wins</th><th>Kills</th><th>K/D</th><th>Status</th><th>Actions</th></tr>
        <tr><td colspan="7" style="text-align:center;color:var(--text3);padding:40px;">Loading top players...</td></tr>
        </table>
      </div>
    </div>
  `;
  window.switchPlayerTab = (tab, btn) => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    if (tab === 'banned') showBannedModal();
  };
  window.searchPlayer = async () => {
    const q = document.getElementById('search-input').value;
    if (!q) return;
    showToast(`Searching for "${q}"...`);
    // In production: hit the API search endpoint
  };

  // Load top players
  const lb = await apiGet('/leaderboard?category=wins&limit=20');
  const tbody = document.querySelector('#player-table table');
  if (lb?.results && lb.results.length > 0) {
    tbody.innerHTML = `
      <tr><th>Rank</th><th>Username</th><th>Level</th><th>Wins</th><th>Kills</th><th>K/D</th><th>Actions</th></tr>
      ${lb.results.map((p, i) => `
        <tr>
          <td><strong>#${i + 1}</strong></td>
          <td>${p.displayName || p.username}</td>
          <td>⭐ ${p.level || 1}</td>
          <td>${p.value || 0}</td>
          <td>${p.subValue || 0}</td>
          <td>${(p.value / Math.max(p.subValue, 1)).toFixed(2)}</td>
          <td>
            <button class="btn btn-sm btn-primary" onclick="showToast('Viewing ${p.username}')">View</button>
            <button class="btn btn-sm btn-danger" onclick="showBanModal('${p.username}')">Ban</button>
          </td>
        </tr>
      `).join('')}
    `;
  } else {
    tbody.innerHTML = `
      <tr><th>Rank</th><th>Username</th><th>Level</th><th>Wins</th><th>Kills</th><th>K/D</th><th>Actions</th></tr>
      <tr><td colspan="7" style="text-align:center;color:var(--text3);padding:36px;">No players registered in database yet. Launch Unity client to register and populate leaderboard!</td></tr>
    `;
  }
}

// ─── MATCHES ────────────────────────────────────────────────────
async function renderMatches(el) {
  el.innerHTML = `
    <h1 style="margin-bottom:16px;">🎮 Match History</h1>

  document.getElementById('t-completed').textContent = all.filter(x => x.status === 'completed').length;

  document.getElementById('tournament-list').innerHTML = `<table>

          ${tn.status === 'live' ? `<button class="btn btn-sm btn-danger" onclick="showToast('Ending ${tn.name}...')">End</button>` : ''}
        </td>
      </tr>
    `).join('')}
  </table>`;

    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.innerHTML = `
      <div class="modal">
        <h2 style="margin-bottom:16px;">Create Tournament</h2>
        <div class="form-group"><label>Name</label><input id="t-name" value="New Tournament"></div>

    document.body.appendChild(overlay);

    </div>
    <div class="stat-grid" id="supervision-stats">
      <div class="stat-card"><div class="label">Daemon Health</div><div class="value" id="sup-health">HEALTHY</div></div>
      <div class="stat-card"><div class="label">Server Tickrate</div><div class="value" id="sup-tick">30.0 Hz</div></div>
      <div class="stat-card"><div class="label">Active Lobbies</div><div class="value" id="sup-matches">0</div></div>
      <div class="stat-card alert"><div class="label">Auto-Sanctions (24h)</div><div class="value" id="sup-sanctions">0</div></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px;">
      <div class="card">
        <div class="card-header"><h2>🖥️ Resource Telemetry</h2></div>
        <table>
          <tr><td><strong>Memory Usage (RAM)</strong></td><td id="sup-mem">64 MB / 512 MB</td></tr>
          <tr><td><strong>Tick Latency</strong></td><td id="sup-latency">14 ms</td></tr>
          <tr><td><strong>Total Supervised Sessions</strong></td><td id="sup-total-sessions">0</td></tr>
          <tr><td><strong>Zombie Sessions Dissolved</strong></td><td id="sup-zombies">0</td></tr>
        </table>
      </div>
      <div class="card">
        <div class="card-header"><h2>🛡️ Automated Sanction Engine</h2></div>
        <p style="font-size:13px;color:var(--text2);line-height:1.6;">
          The authoritative supervisor audits all high-severity anomalies flagged by <code>AntiCheatService.js</code>. Players accumulating >= 3 speedhack/aimbot violations inside a 5-minute window are automatically issued a <strong>24-Hour Shadow Ban</strong> without requiring manual intervention.
        </p>
      </div>
    </div>
    <div class="card">
      <div class="card-header"><h2>🚨 Live Telemetry & Anti-Cheat Infraction Feed</h2></div>
      <div id="sup-infractions-list">
        <table>
          <tr><th>Timestamp</th><th>Player ID</th><th>Player Name</th><th>Violation Type</th><th>Details</th></tr>
          <tr><td colspan="5" style="text-align:center;color:var(--text3);padding:20px;">No infractions recorded in current window</td></tr>
        </table>
      </div>
    </div>
  `;

  window.triggerSupervisionAction = async (action) => {
    showToast(`Executing ${action}...`);
    try {
      const res = await fetch(`${API_URL}/supervision/action`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('token') || ''}` },
        body: JSON.stringify({ action })
      });
      const data = await res.json();
      showToast(data.message || 'Action executed successfully');
      loadSupervisionStatus();
    } catch (e) {
      showToast('Error communicating with supervision daemon');
    }
  };

  window.loadSupervisionStatus = async () => {
    try {
      const res = await fetch(`${API_URL}/supervision/status`, {
        headers: { 'Authorization': `Bearer ${localStorage.getItem('token') || ''}` }
      });
      const json = await res.json();
      if (json && json.success && json.data) {
        updateSupervisionUI(json.data);
      }
    } catch (e) {
      console.warn('Supervision status fetch failed or unauthorized:', e);
    }
  };

  window.updateSupervisionUI = (data) => {
    const elHealth = document.getElementById('sup-health');
    if (elHealth) {
      elHealth.textContent = data.status || 'HEALTHY';
      elHealth.style.color = data.status === 'DEGRADED' ? 'var(--red)' : 'var(--green)';
    }
    const elTick = document.getElementById('sup-tick');
    if (elTick) elTick.textContent = `${data.tickrateHz} Hz`;
    const elMatches = document.getElementById('sup-matches');
    if (elMatches) elMatches.textContent = data.activeMatchesCount || 0;
    const elSanctions = document.getElementById('sup-sanctions');
    if (elSanctions) elSanctions.textContent = data.autoSanctionsIssued || 0;
    const elMem = document.getElementById('sup-mem');
    if (elMem) elMem.textContent = `${data.memoryMB} MB / ${data.memoryTotalMB} MB`;
    const elLatency = document.getElementById('sup-latency');
    if (elLatency) elLatency.textContent = `${data.avgLatencyMs} ms`;
    const elTotal = document.getElementById('sup-total-sessions');
    if (elTotal) elTotal.textContent = data.totalMatchesSupervised || 0;
    const elZombies = document.getElementById('sup-zombies');
    if (elZombies) elZombies.textContent = data.zombieMatchesCleaned || 0;

    const listEl = document.getElementById('sup-infractions-list');
    if (listEl && data.activeInfractions) {
      if (data.activeInfractions.length === 0) {
        listEl.innerHTML = '<table><tr><th>Timestamp</th><th>Player ID</th><th>Player Name</th><th>Violation Type</th><th>Details</th></tr><tr><td colspan="5" style="text-align:center;color:var(--text3);padding:20px;">No infractions recorded in current window</td></tr></table>';
      } else {
        listEl.innerHTML = `
          <table>
            <tr><th>Timestamp</th><th>Player ID</th><th>Player Name</th><th>Violation Type</th><th>Details</th></tr>
            ${data.activeInfractions.map(inf => `
              <tr>
                <td>${new Date(inf.timestamp).toLocaleTimeString()}</td>
                <td><code>${inf.playerId}</code></td>
                <td><strong>${inf.playerName}</strong></td>
                <td><span class="badge red">${inf.violationType}</span></td>
                <td style="color:var(--text2);">${inf.details}</td>
              </tr>
            `).join('')}
          </table>
        `;
      }
    }
  };

  // Connect live Socket.IO listener if available
  if (window.io && !window._supSocketConnected) {
    window._supSocketConnected = true;
    try {
      const socket = io();
      socket.on('supervision:metrics', (metrics) => {
        if (state.page === 'supervision') window.updateSupervisionUI(metrics);
      });
      socket.on('supervision:alert', (alert) => {
        showToast(`🚨 Supervision Alert: ${alert.playerName || alert.matchId} -> ${alert.violationType || alert.type}`);
        if (state.page === 'supervision') window.loadSupervisionStatus();
      });
      socket.on('supervision:sanction', (sanc) => {
        showToast(`⛔ Auto-Sanction: ${sanc.playerName} shadow-banned (${sanc.reason})`);
        if (state.page === 'supervision') window.loadSupervisionStatus();
      });
    } catch (err) {}
  }

  loadSupervisionStatus();
}

// ─── Ban Modal ──────────────────────────────────────────────────
window.showBanModal = (username) => {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal">
      <h2 style="margin-bottom:16px;">🚫 Ban Player</h2>
      <div class="form-group"><label>Player</label><input value="${username}" readonly></div>
      <div class="form-group"><label>Reason</label><textarea rows="3" placeholder="Enter ban reason..."></textarea></div>
      <div class="form-group"><label>Duration</label><select><option>Permanent</option><option>7 Days</option><option>30 Days</option><option>24 Hours</option></select></div>
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px;">
        <button class="btn btn-sm" style="background:var(--bg3);" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
        <button class="btn btn-sm btn-danger" onclick="showToast('${username} has been banned');this.closest('.modal-overlay').remove()">Ban Player</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
};

// ─── Init ───────────────────────────────────────────────────────
render();
</script>
</body>
</html>
